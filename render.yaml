# Blueprint Render: Web Service + PostgreSQL
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: alahya-quince
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: alahya-quince-db
          property: connectionString
      - key: ADMIN_SECRET
        generateValue: true
      - key: EVENT_DATE
        value: "2026-10-10T17:00:00-04:00"

databases:
  - name: alahya-quince-db
    plan: free
    databaseName: alahya_quince
    user: alahya
